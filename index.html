<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TypeForge — Typing Speed Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Top progress bar -->
  <div class="progress-track" aria-hidden="true">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <main class="container" role="main">

    <!-- ── Header ── -->
    <header class="header">
      <div class="brand">
        <div class="brand-icon" aria-hidden="true">⌨</div>
        <div>
          <div class="brand-name">TypeForge</div>
          <div class="brand-sub">measure · improve · forge</div>
        </div>
      </div>

      <div class="header-controls">
        <!-- Mode -->
        <div class="pill-group" role="tablist" aria-label="Test mode">
          <button class="pill active" data-mode="words" role="tab" aria-selected="true">words</button>
          <button class="pill" data-mode="quotes" role="tab" aria-selected="false">quotes</button>
        </div>

        <!-- Duration -->
        <div class="pill-group" role="group" aria-label="Duration">
          <button class="pill" data-dur="15">15s</button>
          <button class="pill" data-dur="30">30s</button>
          <button class="pill active" data-dur="60">60s</button>
          <button class="pill" data-dur="120">120s</button>
        </div>
      </div>
    </header>

    <!-- ── Live stats ── -->
    <div class="stats-bar" aria-live="polite" aria-atomic="false">
      <div class="stat">
        <div class="stat-num" id="statWpm">0</div>
        <div class="stat-lbl">wpm</div>
      </div>
      <div class="stat stat-center">
        <div class="stat-num accent-text" id="statTime">60</div>
        <div class="stat-lbl">sec left</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="statAcc">—</div>
        <div class="stat-lbl">accuracy</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="statErrors">0</div>
        <div class="stat-lbl">errors</div>
      </div>
    </div>

    <!-- ── Typing area ── -->
    <section class="typing-section" id="typingSection" aria-label="Typing test">
      <!-- Word display -->
      <div class="words-outer" id="wordsOuter">
        <div class="words-inner" id="wordsInner">
          <div class="words" id="words" aria-hidden="true"></div>
        </div>
        <div class="caret" id="caret" aria-hidden="true"></div>
        <!-- Blur overlay on top/bottom edges -->
        <div class="fade-top" aria-hidden="true"></div>
        <div class="fade-bottom" aria-hidden="true"></div>
      </div>

      <!-- Hidden real input -->
      <input
        type="text"
        id="typingInput"
        class="typing-input"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        aria-label="Type here to start the test"
        tabindex="0"
      />

      <!-- Hint overlay (before test starts) -->
      <div class="typing-hint" id="typingHint">
        <span>click or start typing to begin</span>
        <span class="hint-sep">·</span>
        <kbd>tab</kbd> to restart
      </div>
    </section>

    <!-- ── Results panel ── -->
    <section class="results hidden" id="results" role="status" aria-live="polite">
      <div class="results-headline">
        <div class="results-label">your speed</div>
        <div class="results-wpm">
          <span id="resultWpm">0</span>
          <span class="results-unit">wpm</span>
        </div>
      </div>

      <div class="results-grid">
        <div class="res-card">
          <div class="res-val" id="resultAcc">—</div>
          <div class="res-lbl">accuracy</div>
        </div>
        <div class="res-card">
          <div class="res-val" id="resultCpm">0</div>
          <div class="res-lbl">cpm</div>
        </div>
        <div class="res-card">
          <div class="res-val" id="resultErrors">0</div>
          <div class="res-lbl">errors</div>
        </div>
        <div class="res-card highlight">
          <div class="res-val" id="resultBest">—</div>
          <div class="res-lbl">best wpm</div>
        </div>
      </div>

      <!-- Mini WPM chart -->
      <canvas id="wpmChart" class="wpm-chart" width="600" height="80" aria-label="WPM over time chart"></canvas>

      <div class="results-actions">
        <button class="btn-primary" id="tryAgainBtn">try again</button>
        <button class="btn-ghost" id="newTestBtn">new test</button>
      </div>
    </section>

    <!-- ── Footer ── -->
    <footer class="footer">
      <span class="footer-brand">TypeForge v2.0</span>
      <span>·</span>
      <span><kbd>tab</kbd> / <kbd>esc</kbd> restart</span>
      <span>·</span>
      <span>backspace allowed within word</span><br>
      <span>Build with ❤️ Vinay singh Tomar</span>
    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
